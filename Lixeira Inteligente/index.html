<!DOCTYPE html>
<html lang="PT-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <div class="grid-container">
      
      <!--menu-lateral-->
      <nav class="menu-lateral">
        <div class="btn-expandir">
            <i class="bi bi-list" id="btn-exp"></i>
        </div><!--btn-expandir-->

        <ul>
            <li class="item-menu ativo">
                <a href="home.html">
                    <span class="icon"><i class="bi bi-house-door"></i></span>
                    <span class="txt-link">Home</span>
                </a>
            </li>
            <li class="item-menu">
                <a href="#">
                    <span class="icon"><i class="bi bi-columns-gap"></i></span>
                    <span class="txt-link">Dashboard</span>
                </a>
            </li>
            <li class="item-menu">
                <a href="#">
                    <span class="icon"><i class="bi bi-truck"></i></span>
                    <span class="txt-link">Veiculos</span>
                </a>
            </li>
            <li class="item-menu">
                <a href="#">
                    <span class="icon"><i class="bi bi-geo-alt-fill"></i></span>
                    <span class="txt-link">Rotas</span>
                </a>
            </li>
            <li class="item-menu">
                <a href="#">
                    <span class="icon"><i class="bi bi-pin-map"></i></span>
                    <span class="txt-link">Mapa</span>
                </a>
            </li>
        </ul>
      </nav>

      <!-- Main -->
      <main class="main-container">

        <!-- Header -->
    <header class="main-header">
        <h1>Dashboard</h1>
      <div class="header-icons">
    <!-- Ícone de notificação agora como botão -->
        <button id="btn-notifications" class="notification-btn">
            <i class="bi bi-bell"></i> <!-- Ícone de notificação -->
        </button>
            <i class="bi bi-person-circle"></i> <!-- Ícone de perfil -->
      </div>
    </header>

<!-- Notificações -->
      <div id="notification-bar" class="notification-bar" style="display: none;">
        <h3>Notificações</h3>
        <ul id="lista-de-notificações">
      <li>
        Rua A: Lixeira cheia <span class="badge">Urgente</span>
      </li>
      <li>
        Rua B: Lixeira cheia <span class="badge">Urgente</span>
      </li>
      <li>
        Rua C: Lixeira cheia <span class="badge">Normal</span>
      </li>
    </ul>
      <button id="planRouteButton">Planejar Rota</button>
    </div>

      <div class="main-content">
        <div class="main-cards">
          <div class="card">
            <div class="card-inner">
              <p class="text-primary">Veiculos em Rota</p>
            </div>
              <span class="text-primary font-weight-bold">50</span>
          </div>

          <div class="card">
            <div class="card-inner">
              <p class="text-primary">Lixeiras Coletadas</p>
              </div>
            <span class="text-primary font-weight-bold">150</span>
          </div>

          <div class="card">
            <div class="card-inner">
              <p class="text-primary">Notificações Atendidas</p>
              </div>
            <span class="text-primary font-weight-bold">60</span>
          </div>
        </div>


        <!-- Gráficos -->
        <div class="charts">
          <div class="charts-card">
            <p class="chart-title">Distância do Recipiente</p>
            <div id="distance-chart"></div>
          </div>
          <div class="charts-card">
            <p class="chart-title">Status do Recipiente</p>
            <div id="status-chart"></div>
          </div>
        </div>
        
      </main>
      <!-- Fim da Main -->

    </div>

    <!-- Scripts -->
    <!-- ApexCharts / gráfico atualizado em tempo real -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/apexcharts/3.35.3/apexcharts.min.js"></script>
    <!-- Custom JS -->
    <script src="js/scripts.js"></script>
  
  </body>
</html>
